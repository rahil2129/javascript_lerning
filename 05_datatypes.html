<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data types</title>
    <script>
        /*Sting integer object*/
        var x = "Testing";
        var yy = 123123;
        var z = ["Hello", 1223, 12.22];

        var a = true;
        var b = null;
        document.write(typeof (x));
        document.write("<br>");
        document.write(typeof (yy));
        document.write("<br>");
        document.write(typeof (z));
        document.write("<br>");
        document.write(typeof (a));
        document.write("<br>");
        document.write(typeof (b));
        document.write("<br>");

        var abc = 20.201;

        var aa = ['HTML', 'CSS', 'JS'];

        var bb = {
            name : "Rahil Shaikh",
            nick_name : "Rahu"
        }

        var cc;
        document.write(abc);
        document.write("<br>");
        document.write(typeof abc);
        document.write("<br> <br>");
        document.write(bb);
        document.write("<br>");
        document.write(typeof bb);
        document.write("<br> <br>");
        document.write(cc);
        document.write("<br>");
        document.write(typeof cc);
    </script>
</head>

</body>

</html>
