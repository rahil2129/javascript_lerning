<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Const or let variable</title>
    <script>
        /* let Variable */
        let firstName = "Rahil Shaikh";
        firstName = "Rocky Handsome";
        document.write(firstName);

        document.write("<br>");
        /* Constant Variable */
        const lastname = "Abdul Majid"
        //lastname = "Abdul Majid"
        document.write(lastname);
    </script>
</head>
<body>
    

</body>
</html>
