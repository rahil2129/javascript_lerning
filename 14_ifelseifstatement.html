<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If Else If statement</title>
    <script>
        /* If else If statement*/
        var time = 23;
        if (time < 12) {
            document.write("<h1>Good Mornign......</h1>");
        } else if (time < 17) {
            document.write("<h1>Good afternoon</h1>")
        } else if (time < 21) {
            document.write("<h1>Good evening</h1>");
        }else if (time < 24) {
            document.write("<h1>Good night</h1>");
        }else {
            document.write("<h1>Clock is death</h1>");
        }


        var per = 60;

        if (per >= 80 && per <= 100) {
            document.write("<h1>You are in Merit</h1>");
        } else if (per >= 60 && per < 80) {
            document.write("<h1>You are in Ist class</h1>");
        } else if (per >= 45 && per < 60) {
            document.write("<h1>You are in IInd class</h1>");
        }else if (per >= 33 && per < 45) {
            document.write("<h1>You are in IIIrd class</h1>");
        } else if (per < 33) {
            document.write("<h1>You are Fail</h1>");
        } else {
            document.write("<h1>please enter valid percentage....</h1>");
        }
    </script>
</head>
<body>
    
</body>
</html>
