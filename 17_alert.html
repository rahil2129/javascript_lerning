<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Box</title>
    <script>
        /* Alert box */
        //alert("Hello World");
        var a = 120;
        var b = 30;

        if (a > b) {
            alert("Value a is : " + a);
            alert("Both value addition is : " + (a + b));
        } else {
            alert("Value a is : " + b);
        }

    </script>
