<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function With parameter</title>
    <script>
        function dynamicName(fname = "Rahil", lname = "Shaikh"){
            document.write("<h1>First Name is : " + fname +"</h1>");
            document.write("<h1>Last Name is : " + lname +"</h1>");
        }

        function sum(a, b){
            document.write(a + b);
        }

        dynamicName('Abdul', 'Majid');

        sum(1524, 35.51);
    </script>
</head>
<body>
    
</body>
</html>
