<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global and Local Variable</title>
    <script>
        /* Local and Global Variable*/
        var name = "Rahil Shaikh"; // Global Variable
        //var fatherName = "Abdul majid"; 
        function fullName() {
            var fatherName = "Abdul majid"; // Local Variable
            document.write("<h1>" + name + " " + fatherName +"</h1>");
        }

        fullName();
        document.write("<h1>" + name + "</h1>");
        document.write("<h1>" + fatherName + "</h1>");
    </script>
</head>
<body>
    
</body>
</html>
