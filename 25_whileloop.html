<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>While Loop</title>
    <script>
        var num = 10;
        while (num >= 1) {
            document.write("<h1>" + num + ") Hello My heart</h1>");

            num--;
        }
    </script>
</head>

</body>
</html>
