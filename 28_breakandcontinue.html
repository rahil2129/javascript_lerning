<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break and Continue</title>
    <script>
        for (num = 1; num <= 10; num++) {
            if (num == 6) {
                document.write("Mufaddal Dhansurawala : " + num + "<br>");
                continue;
                //break;
            }
            document.write("Number : " + num + "<br>");
        }
    </script>
</head>
<body>
    
</body>
</html>
