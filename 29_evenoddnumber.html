<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even or Odd number</title>
    <script>
        for (num = 1; num <= 100; num++) {
            if (num % 2 == 0) {
                document.write("Even Number : " + num + "<br>");
            }
        }
    </script>
</head>
