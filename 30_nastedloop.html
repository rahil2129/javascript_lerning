<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasted Loop</title>
    <script>
        /* Nasted Loop */
        for (var num = 1; num <= 100; num = num + 10) {            
            for (var num2 = num; num2 < num+10; num2++) {
                document.write(num2 + " ");
            }
            document.write(" " + "<br>");
        }
    </script>
</head>
<body>
    
</body>
</html>
