<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasted Loop II</title>
    <script>
        for (num = 1; num <= 10; num++) {
            for (num2 = 1; num2 <= num; num2++) {
                document.write(num2 + " ");
            }
            document.write("<br>");
        }
        document.write("<br>");
        document.write("<br>");

        for (a = 1; a <= 10; a++) {
            for (b = 1; b <= a; b++) {
                document.write(a + " ");
            }
            document.write("<br>");
        }

        document.write("<br>");
        document.write("<br>");
        
        for (a = 10; a >= 1; a--) {
            for (b = 1; b <= a; b++) {
                document.write(a + " ");
            }
            document.write("<br>");
        }
        
        document.write("<br>");
        document.write("<br>");
        
        for (a = 10; a >= 1; a--) {            
            for (b = a; b >= 1; b--) {
                document.write(b+ " ");
            }
            document.write("<br>");
        }

        document.write("<br>");
        document.write("<br>");

        for (var x = 1; x <= 10; x++) {            
            for (var y = 1; y <= x; y++) {
                document.write('*');
            }
            document.write('<br>');
        }

    </script>
</head>
<body>
    
</body>
</html>
