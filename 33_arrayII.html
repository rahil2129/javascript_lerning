<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array II</title>
    <script>
        //var ary = new Array(10, 12, 30, 40);
        var ary = new Array(3);

        ary[0] = "Rahil";
        ary[1] = "Mufaddal";
        ary[3] = "Abdul Majid";

        for (var g = 0; g < 4; g++) {
            ary[g] = prompt("Enter the value : ");
        }

        document.write("<ul>");
        for (a = 0; a < 4; a++) {
            document.write("<li>" + ary[a] + "</li>");
        }
        document.write("</ul>");

    </script>
</head>
<body>
    
</body>
</html>
