<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sort & Reverse Array</title>
    <script>
        var ary = ['Salman', 'zon-elia','Shahrukh', 'Rahil', 'Aamir'];

        document.write(ary);
        document.write("<br>");
        document.write("<br>");
        document.write("<br>");
        ary.sort();
        document.write(ary);
        document.write("<br>");
        document.write("<br>");
        document.write("<br>");
        ary.reverse();
        document.write(ary);
    </script>
</head>

</body>
</html>
