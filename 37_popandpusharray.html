<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Pop and Push</title>
    <script>
        var a = [" Rahil", " Mufaddal", " Arsh", " Ammar"];
        document.write(a + "<br> <br>");
        a.pop(); // Array pop delete the last value of array
        document.write(a + "<br> <br>");
        a.push(" Zaqwan"); // Array push add the value at last in array 
        document.write(a + "<br> <br>");
        a.push(" Arkan", " Ammar");
        document.write(a + "<br> <br>");
        a.sort();
        document.write(a + "<br> <br>");
    </script>
</head>
<body>
    
</body>
</html>
