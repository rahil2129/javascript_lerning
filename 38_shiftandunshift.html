<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift & Unshift</title>
    <script>
        var a = [" Rahil", " Mufaddal", " Arsh", " Zaqwan"];
        document.write(a + "<br> <br>");
        a.shift();// Array Shift delete the first value in array
        document.write(a + "<br> <br>");
        a.unshift(" Zaid", " Arkan", " Ammar"); // Array Unshift add value at first in array
        document.write(a + "<br> <br>");
        a.sort();
        document.write(a + "<br> <br>");
    </script>
</head>
<body>
    
</body>
</html>
