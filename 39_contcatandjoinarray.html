<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concat & join Array</title>
    <script>
        var a = ["Rahil", "Mufaddal", "Arsh"];
        var b = ["Ammar", "Zaqwan"];
        var d = ["Zaid", "Arkan"];
        var c = d.concat(b,a); //Two array value convert in one array 
        document.write(c + "<br><br>");
        c.sort();
        var e = c.join(" / "); // Array value convert in string
        document.write(e + "<br><br>");



        var firstname = ["Rahil", " Mufaddal"];
        var lastname = ["Shaikh", " Dhansurawala"];

        var fullname = firstname.concat(lastname);

        document.write(fullname + "<br>");

        var fullname2 = fullname.join(' - ');

        document.write(fullname2 + "<br>");
    </script>
</head>
<body>
    
</body>
</html>
