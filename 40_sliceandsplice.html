<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slice and Splice</title>
    <script>
        var a = ["Rahil", "Mufaddal", "Arsh", "Ammar"];
        document.write(a + "<br> <br>");
        var b = a.slice(0,1); // Array Slice get the array value using array index 
        document.write(b + "<br> <br>");

        a.splice(-1,0,"Zaqwan", "Arkan"); // Array splice put the value in array
        document.write(a + "<br> <br>");

        var fname = ["Rahil", "Mufaddal", "Ammar", "Anas"];
        document.write(fname + "<br><br>");

        var takename = fname.slice(0);
        document.write(takename + "<br><br>");

        fname.splice(1,0, "Arsh", "Zaid");
        document.write(fname + "<br><br>");
    </script>
</head>
<body>
    
</body>
</html>
