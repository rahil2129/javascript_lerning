<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndexOf & LastIndexOf Array</title>
    <script>
        var a = ["Rahil", "Mufaddal", "Arsh", "Arkan", "Mufaddal", "Zaqwan", "Zaid"];
        document.write(a + "<br><br>");
        var c = a.indexOf("Mufaddal", 0);// Search the array value form starting in array and return index
        var b = a.lastIndexOf("Asshiq", 6); // Search the array value from ending in array and return index

        document.write(c + "<br>");
        document.write(b);
    </script>
</head>
<body>
    
</body>
</html>
