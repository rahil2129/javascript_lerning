<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Some & Every Array</title>
    <script>
        var a = ["Rahil", "Mufaddal", "Arsh", "Arkan", "Zaqwan", "Aslan"];
        var age = [18, 32, 31, 35, 25, 22];
        document.write(a + "<br><br>");
        var b = a.some(agesadult); // Make the fucntion and check value is exists or not
        document.write(b + "<br><br>");
        function agesadult(age) {
            return age == "Mufaddal";
        }

        var c = a.every(checkingname);
        document.write(c + "<br><br>");
        function checkingname(names) {
            return names == "Rahil";
        }


        var fname = ["Mufaddal", "Mufaddal", "Mufaddal", "Mufaddal"];

        document.write("<br>" + fname  + "<br>");
        var checkname = fname.some(checknameof); //For check value in array is available or not then return true and fa
        document.write("<br>" + checkname  + "<br>");
        function checknameof(names) {
            return names == "Salmankhana";
        }

        var everyname = fname.every(everynames);
        document.write("<br>" + everyname  + "<br>");
        function everynames(names) {
            return names == "Mufaddal";
        }
    </script>
</head>

</body>
</html>
