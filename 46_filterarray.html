<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter Array</title>
    <script>
        var arr = [10, 12, 18, 20];
        document.write(arr + "<br>");

        var b = arr.filter(checkage);
        document.write(b + "<br>");

        function checkage(age) {
            return age >= 18;
        }
    </script>
</head>
<body>
    
</body>
</html>
