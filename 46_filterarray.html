<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter Array</title>
    <script>
        var arr = [10, 12, 18, 20];
        document.write(arr + "<br>");

        var b = arr.filter(checkage);
        document.write(b + "<br>");

        function checkage(age) {
            return age >= 18;
        }

        // Filter Array function

        var a = ["Rahil", "Rahu", "Mufaddal", "Shaikh", "Rahil"];
        document.write("<br><br>" + a + "<br><br>")

        var c = a.filter(checkname);
        document.write("<br><br>" + c + "<br><br>")

        function checkname(name) {
            return name == 'Rahil';
        }

    </script>
</head>
<body>
    
</body>
</html>
