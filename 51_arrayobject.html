<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Object</title>
    <script>
        var student = [
            {name : 'Ram', marks: 50},
            {name : 'Sam', marks: 60},
            {name : 'Rakesh', marks: 55}
        ];
        console.log(student);

        for (a=0; a < student.length; a++) {
            document.write(student[a].name + " " + student[a].marks + "<br>");
        }

        var b = [
            {name : "Mufaddal", age : 52},
            {name : "Modi", age : 62}
        ];

        for (c = 0; c <= b.length; c++) {
            document.write(b[c].name + " " + b[c].age + "<br>");
        }
    </script>
</head>
<body>
</body>
</html>
