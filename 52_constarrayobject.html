    <title>Const Variable with Array & Objects</title>
    <script>
     const numbers = [1, 2, 3];
    numbers[0] = 10;
    numbers[1] = 20;
     document.write(numbers);
     const a = {
        name: "MD",
        age :25
     };
     a.name = "Mufaddal";
     a.age = 25;
     console.log(a);




      document.write("<br>");
     const arr = [10, 20, 30];

     //arr[0] = 100; we can changes const Variable value like this
     //arr = [100, 20, 30]; We can not assign const Variablelike this
     document.write(arr);
      document.write("<br>");
     const obj = {name : "Rahil", age : "26"};

     //obj.name = "Shaikh"; we can changes const Variable value like this
     //obj = {name : "Shaikh", age : "26"}; We can not assign const Variablelike this
     document.write(obj.name);
     
</script>
